services:
  - type: web
    name: openclaw
    runtime: docker
    plan: free
    healthCheckPath: /health

    envVars:
      - key: PORT
        value: "10000"

      - key: NODE_OPTIONS
        value: "--max-old-space-size=400"

      - key: OPENCLAW_STATE_DIR
        value: /tmp/.openclaw

      - key: OPENCLAW_WORKSPACE_DIR
        value: /tmp/workspace

      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true

      # GROQ via OpenAI-compatible API
      - key: OPENAI_API_KEY
        sync: false

      - key: OPENAI_BASE_URL
        value: https://api.groq.com/openai/v1

      # Optional fallback providers
      - key: ANTHROPIC_API_KEY
        sync: false

      - key: GEMINI_API_KEY
        sync: false

      - key: OPENROUTER_API_KEY
        sync: false

      - key: MOONSHOT_API_KEY
        sync: false

      - key: MINIMAX_API_KEY
        sync: false
